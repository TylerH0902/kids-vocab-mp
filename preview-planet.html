<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Planet Preview</title>
<style>
  body { margin:0; background:#080C24; display:flex; flex-direction:column; align-items:center; }
  canvas { display:block; cursor:grab; }
  canvas:active { cursor:grabbing; }
  .hint { color:rgba(255,255,255,0.5); font-size:13px; margin-top:8px; font-family:sans-serif; letter-spacing:1px; transition:opacity 0.5s; }
  .hint.hidden { opacity:0; }
  .title { color:#FFD93D; font-size:20px; font-weight:800; font-family:sans-serif; margin-top:16px; text-shadow:0 0 12px rgba(255,217,61,0.5); }
</style>
</head>
<body>
<div class="title">🌟 Story Quest</div>
<canvas id="c"></canvas>
<div class="hint" id="hint">← drag to spin · double-click to zoom →</div>
<script>
const TWO_PI = Math.PI * 2;
const ROAD = [
  { emoji:'🐛', lat: 0.71, lon:-1.28, color:'#FF6B6B' },  // New York
  { emoji:'🦁', lat: 0.73, lon:-1.56, color:'#FF9A3C' },  // Chicago
  { emoji:'🐰', lat: 0.89, lon:-0.02, color:'#9B59B6' },  // London
  { emoji:'⭐', lat: 0.45, lon:-1.40, color:'#2979FF' },  // Southern US
];
const TERRAIN_PATCHES = [
  // North America — NY, Chicago, Southern US checkpoints all within
  { lat: 0.70,lon:-1.65,baseR:0.48,fill:'#7A9E35',stroke:'#3A5A15',hi:'#9DC048',
    pts:[[0.00,0.95],[0.30,1.28],[0.58,0.58],[0.88,1.22],[1.18,0.48],
         [1.48,0.75],[1.78,0.62],[2.08,1.05],[2.38,1.30],[2.70,1.48],
         [3.14,1.20],[3.60,1.45],[4.00,1.35],[4.38,1.05],[4.75,0.88],
         [5.12,0.92],[5.50,0.95]]},
  // South America
  { lat:-0.18,lon:-1.08,baseR:0.33,fill:'#6A9830',stroke:'#385215',hi:'#88C040',
    pts:[[0.00,0.88],[0.38,1.28],[0.72,0.90],[1.08,0.68],[1.44,0.52],
         [1.80,0.75],[2.16,0.65],[2.55,0.72],[2.95,0.88],[3.35,1.15],
         [3.75,1.00],[4.15,0.82],[4.55,0.92],[4.95,1.08],[5.35,0.88]]},
  // Greenland (ice)
  { lat: 1.10,lon:-0.72,baseR:0.17,fill:'#C8E0F0',stroke:'#88A8C0',hi:'#E0F0F8',
    pts:[[0,0.88],[0.8,1.15],[1.6,0.82],[2.4,1.12],[3.2,0.85],[4.0,1.15],[4.8,0.82],[5.6,0.90]]},
  // Europe
  { lat: 0.82,lon: 0.20,baseR:0.26,fill:'#7A9838',stroke:'#3A5815',hi:'#9ABE50',
    pts:[[0.00,0.88],[0.42,0.62],[0.78,1.08],[1.12,0.55],[1.48,1.18],
         [1.82,0.72],[2.20,0.95],[2.60,1.12],[3.00,1.05],[3.40,1.28],
         [3.80,1.42],[4.20,1.10],[4.60,0.88],[5.00,0.82],[5.40,0.88]]},
  // Great Britain — Alice (London) checkpoint sits here
  { lat: 0.90,lon:-0.09,baseR:0.10,fill:'#6A9030',stroke:'#385014',hi:'#88B048',
    pts:[[0.00,0.85],[0.65,1.25],[1.30,0.82],[1.95,1.05],[2.60,0.88],
         [3.25,1.20],[3.90,1.35],[4.55,0.95],[5.20,0.85],[5.85,0.88]]},
  // Africa
  { lat: 0.05,lon: 0.30,baseR:0.42,fill:'#B09030',stroke:'#6A5010',hi:'#CCB048',
    pts:[[0.00,0.98],[0.38,0.72],[0.72,1.05],[1.08,0.82],[1.44,0.70],
         [1.80,0.95],[2.18,1.08],[2.56,1.05],[2.92,1.18],[3.28,1.25],
         [3.64,1.05],[4.00,0.88],[4.38,0.82],[4.76,0.88],[5.14,0.82],
         [5.52,0.92]]},
  // Asia (partial)
  { lat: 0.55,lon: 1.30,baseR:0.52,fill:'#7A9838',stroke:'#3A5815',hi:'#9ABE50',
    pts:[[0.00,0.80],[0.30,1.10],[0.60,0.70],[0.90,1.20],[1.20,0.88],
         [1.50,1.15],[1.80,0.72],[2.10,1.05],[2.45,1.25],[2.80,0.90],
         [3.14,1.10],[3.50,0.82],[3.85,1.20],[4.20,0.88],[4.55,1.05],
         [4.90,0.78],[5.25,1.08],[5.60,0.88]]},
  // Australia
  { lat:-0.42,lon: 2.30,baseR:0.28,fill:'#C09A35',stroke:'#705810',hi:'#DCB850',
    pts:[[0.00,1.05],[0.40,0.70],[0.80,1.18],[1.20,0.88],[1.60,1.12],
         [2.00,0.80],[2.45,1.15],[2.90,1.00],[3.35,1.08],[3.80,0.85],
         [4.25,1.12],[4.70,0.90],[5.15,0.98],[5.60,1.05]]},
];
const TERRAIN_ICONS = [];  // no biome icons on the Earth globe

const canvas = document.getElementById('c');
const SIZE = Math.min(window.innerWidth, 480);
canvas.width = SIZE; canvas.height = SIZE;
const ctx = canvas.getContext('2d');
const cx = SIZE/2, cy = SIZE/2;
const R0 = SIZE * 0.42;
let rotY = 1.00, rotX = 0.38, zoom = 1.0;
let dragStart = null, dragStartY = null, dragRot = 0, dragRotX = 0, lastTap = 0;

const OCEAN_SPARKLES = [
  [-0.10,0.20],[0.35,-0.80],[-0.50,0.40],[0.15,1.30],[-0.30,2.10],
  [0.55,3.20],[-0.20,3.80],[0.10,4.50],[-0.45,5.20],[0.38,5.80],
  [0.60,0.90],[-0.65,1.60],[0.25,-0.30],[-0.15,2.70],[0.50,4.10],
  [-0.38,3.50],[0.08,5.50],[-0.55,4.80],[0.42,2.00],[-0.22,0.70],
  [0.70,-0.50],[-0.72,2.80],[0.18,3.40],[-0.48,5.90],[0.35,1.80],
  [-0.05,4.30],[0.62,1.50],[-0.35,0.10],[0.28,-0.60],[-0.60,3.20],
];

function project(lat, lon) {
  const R = R0 * zoom;
  const x0 = R*Math.cos(lat)*Math.sin(lon), y0 = R*Math.sin(lat), z0 = R*Math.cos(lat)*Math.cos(lon);
  const cR = Math.cos(rotY), sR = Math.sin(rotY);
  const x1 = x0*cR+z0*sR, z1 = -x0*sR+z0*cR;
  const cX = Math.cos(rotX), sX = Math.sin(rotX);
  const y2 = y0*cX - z1*sX, z2 = y0*sX + z1*cX;
  const fov=R*3.2, sc=fov/(fov+z2);
  return { sx:cx+x1*sc, sy:cy-y2*sc, z:z2, scale:sc, visible:z2>-R*0.1 };
}

function ell(x,y,rx,ry,rot) {
  ctx.save(); ctx.translate(x,y); if(rot) ctx.rotate(rot); ctx.scale(rx,ry); ctx.arc(0,0,1,0,TWO_PI); ctx.restore();
}

function drawStars() {
  [[0.05,0.07],[0.18,0.03],[0.92,0.06],[0.83,0.11],[0.08,0.82],[0.94,0.88],[0.76,0.04],[0.02,0.43],[0.97,0.56],[0.50,0.02],[0.28,0.93],[0.70,0.96],[0.37,0.04],[0.64,0.09],[0.16,0.17],[0.87,0.30],[0.03,0.64],[0.95,0.73],[0.44,0.97],[0.58,0.99],[0.12,0.50],[0.88,0.50],[0.33,0.33],[0.66,0.70],[0.50,0.88]].forEach(([fx,fy])=>{
    ctx.fillStyle='rgba(255,255,255,0.75)'; ctx.beginPath(); ctx.arc(fx*SIZE,fy*SIZE,1.3,0,TWO_PI); ctx.fill();
  });
}

function drawPatches(R) {
  for (const p of TERRAIN_PATCHES) {
    const pt = project(p.lat, p.lon); if(!pt.visible) continue;
    const r = p.baseR*R*pt.scale;
    const alpha = Math.max(0,Math.min(0.95,(pt.z+R)/(R*1.5)));
    const sp = p.pts.map(([a,rf])=>[pt.sx+Math.cos(a)*r*rf, pt.sy+Math.sin(a)*r*rf]);
    const n = sp.length;
    ctx.beginPath();
    const fm = [(sp[0][0]+sp[n-1][0])/2,(sp[0][1]+sp[n-1][1])/2];
    ctx.moveTo(fm[0],fm[1]);
    for(let i=0;i<n;i++){const[x1,y1]=sp[i],[x2,y2]=sp[(i+1)%n]; ctx.quadraticCurveTo(x1,y1,(x1+x2)/2,(y1+y2)/2);}
    ctx.closePath();
    const g=ctx.createRadialGradient(pt.sx-r*0.2,pt.sy-r*0.2,0,pt.sx,pt.sy,r*1.1);
    g.addColorStop(0,p.hi); g.addColorStop(0.55,p.fill); g.addColorStop(1,p.stroke);
    ctx.save(); ctx.globalAlpha=alpha; ctx.fillStyle=g; ctx.fill();
    ctx.strokeStyle=p.stroke; ctx.lineWidth=1.2; ctx.stroke(); ctx.restore();
  }
}

function drawForest(x,y,s) {
  const trees=[[-1.48,0.60,true],[-1.15,0.72,true],[0.82,0.68,true],[-0.38,1.00,false],[1.18,0.80,false]];
  for(const back of[true,false])for(const[df,hs,isBack]of trees){
    if(isBack!==back)continue;
    const tx=x+s*df,h=s*1.9*hs,hw=s*0.65*hs;
    ctx.fillStyle=isBack?'#3E2010':'#5C3317'; ctx.fillRect(tx-hw*0.12,y+s*0.02,hw*0.24,s*0.38*hs);
    ctx.fillStyle=isBack?'#1A4A1A':'#1B5E20'; ctx.beginPath(); ctx.moveTo(tx,y-h*0.50); ctx.lineTo(tx-hw,y+s*0.05); ctx.lineTo(tx+hw,y+s*0.05); ctx.closePath(); ctx.fill();
    ctx.fillStyle=isBack?'#256025':'#2E7D32'; ctx.beginPath(); ctx.moveTo(tx,y-h*0.78); ctx.lineTo(tx-hw*0.75,y-h*0.28); ctx.lineTo(tx+hw*0.75,y-h*0.28); ctx.closePath(); ctx.fill();
    ctx.fillStyle=isBack?'#307030':'#388E3C'; ctx.beginPath(); ctx.moveTo(tx,y-h); ctx.lineTo(tx-hw*0.48,y-h*0.62); ctx.lineTo(tx+hw*0.48,y-h*0.62); ctx.closePath(); ctx.fill();
  }
}

function drawMountain(x,y,s) {
  const peaks=[{dx:-s*1.05,h:1.35,w:0.88},{dx:s*0.15,h:2.05,w:1.02},{dx:s*1.22,h:1.65,w:0.92}];
  for(const p of peaks){const px=x+p.dx,ph=s*p.h,pw=s*p.w;
    ctx.fillStyle='#546E7A'; ctx.beginPath(); ctx.moveTo(px,y-ph); ctx.lineTo(px-pw,y+s*0.28); ctx.lineTo(px+pw,y+s*0.28); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#455A64'; ctx.beginPath(); ctx.moveTo(px,y-ph); ctx.lineTo(px-pw*0.14,y-ph*0.52); ctx.lineTo(px-pw,y+s*0.28); ctx.closePath(); ctx.fill();
    ctx.strokeStyle='#37474F'; ctx.lineWidth=0.8; ctx.beginPath(); ctx.moveTo(px+pw*0.2,y-ph*0.38); ctx.lineTo(px+pw*0.44,y+s*0.12); ctx.stroke();
  }
  for(const p of peaks){const px=x+p.dx,ph=s*p.h,sw=s*p.w*0.38;
    ctx.fillStyle='#ECEFF1'; ctx.beginPath(); ctx.moveTo(px,y-ph); ctx.lineTo(px-sw,y-ph*0.71); ctx.lineTo(px+sw*0.88,y-ph*0.67); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#CFD8DC'; ctx.beginPath(); ctx.moveTo(px,y-ph); ctx.lineTo(px-sw*0.12,y-ph*0.79); ctx.lineTo(px-sw,y-ph*0.71); ctx.closePath(); ctx.fill();
  }
}

function drawCave(x,y,s) {
  const aw=s*1.30,ah=s*1.05;
  ctx.fillStyle='#37474F'; ctx.beginPath();
  ctx.moveTo(x-aw*1.12,y+s*0.18); ctx.lineTo(x-aw*1.12,y-s*0.08);
  ctx.quadraticCurveTo(x-aw,y-ah*0.60,x-aw*0.42,y-ah);
  ctx.quadraticCurveTo(x,y-ah*1.08,x+aw*0.42,y-ah);
  ctx.quadraticCurveTo(x+aw,y-ah*0.60,x+aw*1.12,y-s*0.08);
  ctx.lineTo(x+aw*1.12,y+s*0.18); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#263238'; ctx.beginPath();
  ctx.moveTo(x-aw*1.12,y+s*0.18); ctx.lineTo(x-aw*1.12,y-s*0.08);
  ctx.quadraticCurveTo(x-aw,y-ah*0.50,x-aw*0.70,y-ah*0.70);
  ctx.lineTo(x-aw*0.62,y+s*0.18); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#050510'; ctx.beginPath(); ell(x,y-ah*0.32,aw*0.62,ah*0.66,0); ctx.fill();
  ctx.fillStyle='#546E7A';
  [[-aw*0.34,ah*0.80],[0,ah*0.87],[aw*0.32,ah*0.79]].forEach(([dx,topY])=>{
    const ty=y-topY,tl=s*0.22; ctx.beginPath(); ctx.moveTo(x+dx-s*0.07,ty); ctx.lineTo(x+dx+s*0.07,ty); ctx.lineTo(x+dx,ty+tl); ctx.closePath(); ctx.fill();
  });
  ctx.fillStyle='rgba(255,210,0,0.75)';
  ctx.beginPath(); ell(x-ah*0.13,y-ah*0.26,s*0.07,s*0.05,0); ctx.fill();
  ctx.beginPath(); ell(x+ah*0.13,y-ah*0.26,s*0.07,s*0.05,0); ctx.fill();
}

function drawFlowers(x,y,s) {
  ctx.fillStyle='#66BB6A'; ctx.beginPath(); ell(x,y+s*0.08,s*1.55,s*0.38,0); ctx.fill();
  ctx.strokeStyle='#43A047'; ctx.lineWidth=1.2;
  [[-s*1.0,0],[-s*0.48,-s*0.04],[s*0.08,0],[s*0.62,-s*0.03],[s*1.12,s*0.02]].forEach(([bx,by])=>{
    ctx.beginPath(); ctx.moveTo(x+bx,y+by); ctx.quadraticCurveTo(x+bx+s*0.14,y+by-s*0.32,x+bx+s*0.06,y+by-s*0.52); ctx.stroke();
  });
  [{dx:-s*0.92,pCol:'#FF8A80',cCol:'#FF5252',n:5},{dx:s*0.18,pCol:'#FFD740',cCol:'#FFAB00',n:6},{dx:s*1.08,pCol:'#EA80FC',cCol:'#AA00FF',n:5}].forEach(({dx,pCol,cCol,n})=>{
    const fx=x+dx,fy=y-s*0.22,pr=s*0.20,or=pr*1.45;
    ctx.strokeStyle='#2E7D32'; ctx.lineWidth=1.2; ctx.beginPath(); ctx.moveTo(fx,fy+pr); ctx.lineTo(fx,y+s*0.08); ctx.stroke();
    ctx.fillStyle=pCol;
    for(let i=0;i<n;i++){const a=(i/n)*TWO_PI; ctx.beginPath(); ell(fx+Math.cos(a)*or,fy+Math.sin(a)*or,pr*0.88,pr*0.52,a); ctx.fill();}
    ctx.fillStyle='#FFF9C4'; ctx.beginPath(); ctx.arc(fx,fy,pr*0.54,0,TWO_PI); ctx.fill();
    ctx.fillStyle=cCol; ctx.beginPath(); ctx.arc(fx,fy,pr*0.26,0,TWO_PI); ctx.fill();
  });
}

function drawIcons(R) {
  const sorted = TERRAIN_ICONS.map(ic=>({...ic,...project(ic.lat,ic.lon)})).sort((a,b)=>a.z-b.z);
  for(const ic of sorted){
    if(!ic.visible)continue;
    const alpha=Math.max(0.2,Math.min(1,(ic.z+R)/(R*1.2))), s=R*0.22*ic.scale;
    ctx.save(); ctx.globalAlpha=alpha;
    if(ic.type==='forest') drawForest(ic.sx,ic.sy,s);
    else if(ic.type==='mountain') drawMountain(ic.sx,ic.sy,s);
    else if(ic.type==='cave') drawCave(ic.sx,ic.sy,s);
    else if(ic.type==='flowers') drawFlowers(ic.sx,ic.sy,s);
    ctx.restore();
  }
}

function drawRoad(R) {
  for(let i=0;i<ROAD.length-1;i++){
    const a=ROAD[i],b=ROAD[i+1];
    let lA=a.lon,lB=b.lon;
    if(lB-lA>Math.PI)lA+=TWO_PI; if(lA-lB>Math.PI)lB+=TWO_PI;
    for(let s=0;s<=18;s++){const t=s/18,pt=project(a.lat+(b.lat-a.lat)*t,lA+(lB-lA)*t),al=Math.max(0.08,Math.min(0.7,(pt.z+R)/(2*R)));ctx.fillStyle=`rgba(255,215,0,${al})`;ctx.beginPath();ctx.arc(pt.sx,pt.sy,3,0,TWO_PI);ctx.fill();}
    const pA=project(a.lat+(b.lat-a.lat)*0.55,lA+(lB-lA)*0.55),pB=project(a.lat+(b.lat-a.lat)*0.63,lA+(lB-lA)*0.63);
    const al=Math.max(0.1,Math.min(0.9,(pA.z+R)/(R*1.5))),ang=Math.atan2(pB.sy-pA.sy,pB.sx-pA.sx),sz=9*Math.max(0.5,pA.scale);
    ctx.save();ctx.globalAlpha=al;ctx.fillStyle='#FFD93D';ctx.translate(pA.sx,pA.sy);ctx.rotate(ang);ctx.beginPath();ctx.moveTo(sz,0);ctx.lineTo(-sz*0.6,sz*0.55);ctx.lineTo(-sz*0.6,-sz*0.55);ctx.closePath();ctx.fill();ctx.restore();
  }
}

function drawCheckpoints(R) {
  const pts=ROAD.map(s=>({...project(s.lat,s.lon),...s})).sort((a,b)=>a.z-b.z);
  for(const p of pts){
    const size=R*0.21*Math.max(0.55,p.scale),alpha=p.visible?Math.max(0.3,Math.min(1,(p.z+R)/(R*1.1))):0.25;
    ctx.globalAlpha=alpha;
    if(p.z>R*0.1){ctx.fillStyle=p.color+'44';ctx.beginPath();ctx.arc(p.sx,p.sy,size*1.6,0,TWO_PI);ctx.fill();}
    ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.sx,p.sy,size,0,TWO_PI);ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.85)';ctx.lineWidth=2.5;ctx.stroke();
    ctx.font=`${Math.round(size*1.05)}px sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle='#fff';
    ctx.fillText(p.emoji,p.sx,p.sy);ctx.globalAlpha=1;
  }
}

function drawOceanSparkles(R) {
  for(const[lat,lon]of OCEAN_SPARKLES){
    const pt=project(lat,lon); if(!pt.visible)continue;
    const alpha=Math.max(0,Math.min(0.7,(pt.z+R)/(R*1.5)));
    ctx.globalAlpha=alpha*0.7; ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.arc(pt.sx,pt.sy,1.6,0,TWO_PI); ctx.fill();
  }
  ctx.globalAlpha=1;
}

function drawPatches2(R) {
  for(const p of TERRAIN_PATCHES){
    const pt=project(p.lat,p.lon); if(!pt.visible)continue;
    const r=p.baseR*R*pt.scale, alpha=Math.max(0,Math.min(0.95,(pt.z+R)/(R*1.5)));
    const sp=p.pts.map(([a,rf])=>[pt.sx+Math.cos(a)*r*rf,pt.sy+Math.sin(a)*r*rf]);
    const n=sp.length;
    ctx.beginPath();
    const fm=[(sp[0][0]+sp[n-1][0])/2,(sp[0][1]+sp[n-1][1])/2]; ctx.moveTo(fm[0],fm[1]);
    for(let i=0;i<n;i++){const[x1,y1]=sp[i],[x2,y2]=sp[(i+1)%n];ctx.quadraticCurveTo(x1,y1,(x1+x2)/2,(y1+y2)/2);}
    ctx.closePath();
    const g=ctx.createRadialGradient(pt.sx-r*0.2,pt.sy-r*0.2,0,pt.sx,pt.sy,r*1.1);
    g.addColorStop(0,p.hi);g.addColorStop(0.55,p.fill);g.addColorStop(1,p.stroke);
    // Shadow
    ctx.save();ctx.globalAlpha=alpha*0.35;ctx.fillStyle='rgba(0,0,0,0.5)';ctx.translate(R*0.008,R*0.010);ctx.fill();ctx.restore();
    // Fill + thick outline
    ctx.save();ctx.globalAlpha=alpha;ctx.fillStyle=g;ctx.fill();
    ctx.strokeStyle='#1A1A2E';ctx.lineWidth=Math.max(1.5,R*0.018*pt.scale);ctx.lineJoin='round';ctx.stroke();
    ctx.restore();
  }
}

function draw() {
  const R = R0*zoom;
  ctx.clearRect(0,0,SIZE,SIZE);
  const bg=ctx.createLinearGradient(0,0,0,SIZE);bg.addColorStop(0,'#080C24');bg.addColorStop(1,'#0D1840');ctx.fillStyle=bg;ctx.fillRect(0,0,SIZE,SIZE);
  drawStars();
  // Solid ocean
  const ocean=ctx.createRadialGradient(cx-R*0.28,cy-R*0.30,R*0.05,cx,cy,R);
  ocean.addColorStop(0,'#7DD4F0');ocean.addColorStop(0.5,'#3FA8DC');ocean.addColorStop(1,'#1A7BB8');
  ctx.fillStyle=ocean;ctx.beginPath();ctx.arc(cx,cy,R,0,TWO_PI);ctx.fill();
  drawOceanSparkles(R);
  ctx.save();ctx.beginPath();ctx.arc(cx,cy,R,0,TWO_PI);ctx.clip();drawPatches2(R);ctx.restore();
  // Subtle highlight
  const shine=ctx.createRadialGradient(cx-R*0.35,cy-R*0.38,0,cx-R*0.20,cy-R*0.22,R*0.45);
  shine.addColorStop(0,'rgba(255,255,255,0.18)');shine.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=shine;ctx.beginPath();ctx.arc(cx,cy,R,0,TWO_PI);ctx.fill();
  // Dark cartoon border
  ctx.strokeStyle='#1A1A2E';ctx.lineWidth=R*0.022;ctx.beginPath();ctx.arc(cx,cy,R,0,TWO_PI);ctx.stroke();
  drawIcons(R); drawRoad(R); drawCheckpoints(R);
}

draw();

canvas.addEventListener('mousedown', e => { dragStart=e.clientX; dragStartY=e.clientY; dragRot=rotY; dragRotX=rotX; });
canvas.addEventListener('mousemove', e => {
  if(dragStart===null) return;
  rotY = dragRot  + (e.clientX-dragStart)  / (R0*zoom*1.1);
  rotX = dragRotX + (e.clientY-dragStartY) / (R0*zoom*1.1);
  rotX = Math.max(-1.4, Math.min(1.4, rotX));
  draw();
});
canvas.addEventListener('mouseup', () => { dragStart=null; dragStartY=null; });
canvas.addEventListener('mouseleave', () => { dragStart=null; dragStartY=null; });
canvas.addEventListener('dblclick', () => {
  const target=zoom>1.2?1.0:1.7, start=zoom, t0=Date.now();
  const tick=()=>{const p=Math.min(1,(Date.now()-t0)/320),e=p<0.5?2*p*p:-1+(4-2*p)*p;zoom=start+(target-start)*e;draw();if(p<1)requestAnimationFrame(tick);};
  requestAnimationFrame(tick);
});
canvas.addEventListener('touchstart', e=>{dragStart=e.touches[0].clientX;dragStartY=e.touches[0].clientY;dragRot=rotY;dragRotX=rotX;},{passive:true});
canvas.addEventListener('touchmove', e=>{
  rotY=dragRot+(e.touches[0].clientX-dragStart)/(R0*zoom*1.1);
  rotX=Math.max(-1.4,Math.min(1.4,dragRotX+(e.touches[0].clientY-dragStartY)/(R0*zoom*1.1)));
  draw();
},{passive:true});
canvas.addEventListener('touchend', ()=>{dragStart=null;dragStartY=null;});

setTimeout(()=>document.getElementById('hint').classList.add('hidden'),4000);
</script>
</body>
</html>
